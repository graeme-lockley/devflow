name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install jq (stories board pi-render)
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: CI (lint, format check, test)
        run: deno task ci
